<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tracker-box">
        <h1>Expense Tracker</h1>
        
        <div class="total-container">
            <h2>Total Expenses</h2>
            <div class="total-amount">$<span id="total-val">0.00</span></div>
        </div>

        <div class="input-group">
            <label for="expense-name">Expense Description</label>
            <input type="text" id="expense-name" placeholder="e.g., Groceries">
        </div>

        <div class="input-group">
            <label for="expense-amount">Amount ($)</label>
            <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0">
        </div>

        <button class="btn-add" id="add-btn">Add Expense</button>

        <h3 class="expense-list-title">History</h3>
        <ul class="expense-list" id="expense-list">
            <li class="empty-state" id="empty-msg">No expenses added yet.</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
