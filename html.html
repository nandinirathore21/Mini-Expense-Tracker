<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Expense Tracker</title>
    <style>
        /* Base Reset with a modern, clean font */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Explicitly forcing sharp, square edges everywhere */
            border-radius: 0 !important; 
        }

        body {
            background-color: #f4f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Square Container Box */
        .tracker-box {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            box-shadow: 0 0 0 2px #111111; /* Sharp crisp border alternative */
            border: 4px solid #111111;
        }

        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 3px solid #111111;
            padding-bottom: 10px;
        }

        /* Total Summary Box */
        .total-container {
            background-color: #111111;
            color: #ffffff;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .total-container h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .total-amount {
            font-size: 32px;
            font-weight: bold;
        }

        /* Form Layout */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #111111;
            font-size: 16px;
            outline: none;
            background-color: #fafafa;
        }

        input:focus {
            background-color: #ffffff;
            border-color: #0056b3;
        }

        /* Square Add Button */
        .btn-add {
            width: 100%;
            padding: 15px;
            background-color: #111111;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-bottom: 25px;
        }

        .btn-add:hover {
            background-color: #333333;
        }

        /* Expense List Container */
        .expense-list-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 2px solid #111111;
            padding-bottom: 5px;
        }

        .expense-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        /* Expense Item Layout */
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 2px solid #111111;
            margin-bottom: 10px;
            background-color: #ffffff;
        }

        .expense-info {
            display: flex;
            flex-direction: column;
        }

        .expense-name {
            font-weight: bold;
            font-size: 16px;
        }

        .expense-cost {
            font-size: 16px;
            font-weight: bold;
            margin-right: 15px;
        }

        /* Square Delete Button */
        .btn-delete {
            background-color: #ff4141;
            color: white;
            border: 2px solid #111111;
            padding: 6px 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background-color: #e03030;
        }

        .empty-state {
            text-align: center;
            color: #777;
            padding: 15px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="tracker-box">
        <h1>Expense Tracker</h1>
        
        <div class="total-container">
            <h2>Total Expenses</h2>
            <div class="total-amount">$<span id="total-val">0.00</span></div>
        </div>

        <div class="input-group">
            <label for="expense-name">Expense Description</label>
            <input type="text" id="expense-name" placeholder="e.g., Groceries">
        </div>

        <div class="input-group">
            <label for="expense-amount">Amount ($)</label>
            <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0">
        </div>

        <button class="btn-add" id="add-btn">Add Expense</button>

        <h3 class="expense-list-title">History</h3>
        <ul class="expense-list" id="expense-list">
            <li class="empty-state" id="empty-msg">No expenses added yet.</li>
        </ul>
    </div>

    <script>
        // DOM Elements
        const expenseNameInput = document.getElementById('expense-name');
        const expenseAmountInput = document.getElementById('expense-amount');
        const addBtn = document.getElementById('add-btn');
        const expenseList = document.getElementById('expense-list');
        const totalVal = document.getElementById('total-val');
        const emptyMsg = document.getElementById('empty-msg');

        // State Array to hold items
        let expenses = [];

        // Function to update the DOM
        function updateUI() {
            // Clear current list items except template blocks if writing raw HTML
            expenseList.innerHTML = '';

            if (expenses.length === 0) {
                expenseList.appendChild(emptyMsg);
                totalVal.textContent = '0.00';
                return;
            }

            let total = 0;

            expenses.forEach((expense) => {
                total += expense.amount;

                // Create Item Container
                const li = document.createElement('li');
                li.className = 'expense-item';

                // Setup internal content structure
                li.innerHTML = `
                    <div class="expense-info">
                        <span class="expense-name">${expense.name}</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="expense-cost">$${expense.amount.toFixed(2)}</span>
                        <button class="btn-delete" onclick="deleteExpense(${expense.id})">Delete</button>
                    </div>
                `;

                expenseList.appendChild(li);
            });

            // Update Total Value
            totalVal.textContent = total.toFixed(2);
        }

        // Function to handle adding an expense
        function addExpense() {
            const name = expenseNameInput.value.trim();
            const amount = parseFloat(expenseAmountInput.value);

            // Simple Validation
            if (name === '' || isNaN(amount) || amount <= 0) {
                alert('Please enter a valid expense description and positive numeric amount.');
                return;
            }

            // Create object item structure
            const expense = {
                id: Date.now(), // Unique ID using timestamp
                name: name,
                amount: amount
            };

            expenses.push(expense);
            
            // Clear Inputs
            expenseNameInput.value = '';
            expenseAmountInput.value = '';

            updateUI();
        }

        // Function to delete an individual expense line
        function deleteExpense(id) {
            expenses = expenses.filter(expense => expense.id !== id);
            updateUI();
        }

        // Event Listeners
        addBtn.addEventListener('click', addExpense);

        // Allow pressing "Enter" on input fields to submit
        expenseAmountInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addExpense();
        });
    </script>
</body>
</html>
